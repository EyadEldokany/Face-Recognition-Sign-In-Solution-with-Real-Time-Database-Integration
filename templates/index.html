<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #202020;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 {
            font-size: 2.4em;
            margin-bottom: 10px;
            animation: fadeIn 0.8s ease;
        }
        p { color: #aaa; margin-bottom: 32px; font-size: 15px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .buttons { display: flex; gap: 16px; justify-content: center; }
        a { text-decoration: none; }
        button {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.25s, box-shadow 0.25s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.97); }
        .register-button { background-color: #c50000; color: #fff; }
        .register-button:hover { background-color: #ff1733; }
        .signin-button { background-color: #333; color: #fff; }
        .signin-button:hover { background-color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Face Recognition</h1>
        <p>Register your face or sign in using facial recognition.</p>
        <div class="buttons">
            <a href="/register">
                <button class="register-button">Register</button>
            </a>
            <a href="/sign-in">
                <button class="signin-button">Sign In</button>
            </a>
        </div>
    </div>
</body>
</html>
